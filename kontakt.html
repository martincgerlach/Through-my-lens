<!DOCTYPE html>
<html lang="da">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kontakt mig</title>
<link rel="stylesheet" href="css/general.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="icon" type="image/png" href="assets/imgs/favicon.png">
</head>

<body>

<header class="main-header">

<div class="header-inner">

<div class="header-left">
  <a href="index.html">
    <img src="assets/imgs/forside/Gerlach-Design.svg" alt="MG Logo" class="site-logo">
  </a>
</div>

<div class="header-center">
<h1><em>Kontakt mig</em></h1>
</div>

<div class="header-right">

<nav class="icon-nav">

<a href="calm-nature.html" class="nav-item">🌿</a>

</nav>

</div>
</div>

</header>


<main class="container contact-layout">

<aside class="contact-sidebar">

<img src="assets/imgs/kontakt-mig/profilbillede.webp" alt="Profilbillede" class="contact-profile">

<div class="contact-about">
<h3>Lidt om mig</h3>
</div>

</aside>


<section class="contact-form-wrapper">

<form class="contact-form" id="contactForm">

<input type="text" id="name" placeholder="Navn" required>

<input type="email" id="email" placeholder="e-mail" required>

<textarea id="message" placeholder="Besked" required></textarea>

<input type="file" id="image" accept="image/*">

<button type="submit">Send Besked</button>

</form>

</section>

<div id="popup" class="popup">
  Tak for din besked!
</div>
</section>

</main>
<script src="script.js"></script>
</body>
</html>
